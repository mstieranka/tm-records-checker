services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: tmrecords
      POSTGRES_USER: tmrecords
      POSTGRES_PASSWORD: tmrecords
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tmrecords -d tmrecords"]
      interval: 5s
      timeout: 5s
      retries: 5

  checker:
    build: .
    ports:
      - "3020:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://tmrecords:tmrecords@postgres:5432/tmrecords
    volumes:
      - type: bind
        source: ./data/
        target: /app/data/
    networks:
      - tm-records-checker
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
